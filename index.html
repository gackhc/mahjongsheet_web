<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마작 기록장 Lite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 🛑 여기에 아까 복사한 클라이언트 ID를 넣어주세요!
        const GOOGLE_CLIENT_ID = '1075580641444-7djd26oa43g13rtmt7d4ou22ta8bvnr4.apps.googleusercontent.com';
        
        // 🌟 전역으로 액세스 토큰을 들고 있을 변수
        let accessToken = null;

        function LoginScreen({ onLoginSuccess }) {
            const handleGoogleLogin = () => {
                // 구글 토큰 클라이언트 초기화 및 호출
                const tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: GOOGLE_CLIENT_ID,
                    scope: 'https://www.googleapis.com/auth/spreadsheets',
                    callback: (response) => {
                        if (response.error !== undefined) {
                            alert('로그인에 실패했습니다. (오류: ' + response.error + ')');
                            return;
                        }
                        // 로그인 성공 시 토큰 저장 후 화면 전환
                        accessToken = response.access_token;
                        console.log("✅ 토큰 발급 완료:", accessToken);
                        onLoginSuccess();
                    },
                });
                
                // 로그인 팝업 띄우기
                tokenClient.requestAccessToken();
            };

            return (
                <div class="max-w-md mx-auto min-h-screen flex flex-col items-center justify-center p-4">
                    <div class="bg-white p-8 rounded-xl shadow-lg w-full text-center">
                        <h1 class="text-3xl font-black text-gray-800 mb-2">🀄</h1>
                        <h1 class="text-xl font-black text-gray-800 mb-2">마작 기록장</h1>
                        <p class="text-gray-500 mb-8 text-sm">기록장 접근을 위해 로그인이 필요합니다.</p>
                        
                        <button 
                            onClick={handleGoogleLogin}
                            class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 rounded-lg p-3 hover:bg-gray-50 transition-colors shadow-sm"
                        >
                            <img src="https://www.google.com/favicon.ico" alt="Google Logo" class="w-5 h-5" />
                            <span class="font-bold text-gray-700">Google 계정으로 계속하기</span>
                        </button>
                    </div>
                </div>
            );
        }

        // --- (이하 InputScreen, HistoryScreen, StatScreen은 이전 코드와 동일하여 생략. 이전 코드를 그대로 두시면 됩니다!) ---
        function InputScreen() { return <div class="p-4 text-center mt-10"><p>점수 입력 화면</p></div>; }
        function HistoryScreen() { return <div class="p-4 text-center mt-10"><p>기록 화면</p></div>; }
        function StatScreen() { return <div class="p-4 text-center mt-10"><p>통계 화면</p></div>; }

        function App() {
            const [isLoggedIn, setIsLoggedIn] = useState(false);
            const [activeTab, setActiveTab] = useState('input');

            if (!isLoggedIn) {
                return <LoginScreen onLoginSuccess={() => setIsLoggedIn(true)} />;
            }

            const renderContent = () => {
                switch(activeTab) {
                    case 'input': return <InputScreen />;
                    case 'history': return <HistoryScreen />;
                    case 'stat': return <StatScreen />;
                    default: return <InputScreen />;
                }
            };

            return (
                <div class="max-w-md mx-auto min-h-screen bg-gray-50 relative shadow-xl">
                    <div class="bg-white h-14 flex justify-between items-center px-4 shadow-sm sticky top-0 z-10">
                        <h1 class="font-black text-lg text-gray-800">🀄 마작 기록장</h1>
                        <button onClick={() => setIsLoggedIn(false)} class="text-xs text-gray-400 underline">로그아웃</button>
                    </div>
                    <div class="min-h-screen">{renderContent()}</div>
                    <div class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-200 flex justify-around pb-safe">
                        <button onClick={() => setActiveTab('history')} class={`flex-1 py-3 flex flex-col items-center gap-1 transition-colors ${activeTab === 'history' ? 'text-blue-600' : 'text-gray-400'}`}>
                            <i class="fas fa-list text-xl"></i><span class="text-[10px] font-bold">기록</span>
                        </button>
                        <button onClick={() => setActiveTab('input')} class={`flex-1 py-3 flex flex-col items-center gap-1 transition-colors ${activeTab === 'input' ? 'text-blue-600' : 'text-gray-400'}`}>
                            <i class="fas fa-pen-to-square text-xl"></i><span class="text-[10px] font-bold">입력</span>
                        </button>
                        <button onClick={() => setActiveTab('stat')} class={`flex-1 py-3 flex flex-col items-center gap-1 transition-colors ${activeTab === 'stat' ? 'text-blue-600' : 'text-gray-400'}`}>
                            <i class="fas fa-chart-simple text-xl"></i><span class="text-[10px] font-bold">통계</span>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
