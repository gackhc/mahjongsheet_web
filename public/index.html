<head>

        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            /* 세련된 화이트톤 & 모던 라이트 팔레트 */
            --bg-main: #f8fafc; /* 아주 연한 그레이 블루 */
            --bg-sub: #f1f5f9;
            --bg-card: rgba(255, 255, 255, 0.85);
            --bg-card-strong: #ffffff;
            
            --text-main: #1e293b; /* 깊은 네이비 그레이 */
            --text-sub: #475569;
            --text-muted: #94a3b8;
            
            --line: rgba(0, 0, 0, 0.06);
            --line-strong: rgba(0, 0, 0, 0.1);
            
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.04);
            --shadow-soft: 0 10px 25px rgba(0, 0, 0, 0.03);
            
            /* 포인트 컬러 */
            --primary: #e11d48; /* 구글 레드 */
            --green: #10b981;   /* 마작 포인트 그린 */
            --accent: #4f46e5;  /* 포인트 블루 */
        }

        html {
            scroll-behavior: smooth;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            color: var(--text-main);
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at top left, rgba(79, 70, 229, 0.05), transparent 30%),
                radial-gradient(circle at top right, rgba(16, 185, 129, 0.05), transparent 30%);
            background-attachment: fixed;
            line-height: 1.6;
        }

        .page-wrap {
            width: 100%;
            max-width: 1040px;
            margin: 0 auto;
            padding: 0 18px 72px;
        }

        /* 상단 언어 선택 */
        .top-lang {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 50;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 8px;
            border-radius: 16px;
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--line);
        }

        #index-language-select {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--line) !important;
            border-radius: 10px !important;
            padding: 6px 10px !important;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        /* 히어로 섹션 */
        .hero {
            padding-top: 50px;
        }

        .hero-panel {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: var(--shadow);
            border-radius: 32px;
            padding: 56px 30px 48px;
            text-align: center;
            position: relative;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            border-radius: 999px;
            background: rgba(16, 185, 129, 0.08);
            color: var(--green);
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 20px;
            border: 1px solid rgba(16, 185, 129, 0.1);
        }

        h1 {
            margin: 0 0 16px;
            font-size: 40px;
            font-weight: 800;
            letter-spacing: -0.03em;
            color: #111827;
        }

        .hero-subtitle {
            max-width: 640px;
            margin: 0 auto 36px;
            color: var(--text-sub);
            font-size: 16px;
            word-break: keep-all;
        }

        /* 에러 메시지 */
        .error-message {
            color: #dc2626;
            margin-bottom: 24px;
            background: #fef2f2;
            border: 1px solid #fee2e2;
            border-radius: 16px;
            padding: 16px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 버튼 스타일 */
        .btn-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            max-width: 340px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 58px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }

        .btn:active { transform: scale(0.97); }

        .btn-google {
            background: #000000; /* 깔끔한 블랙 혹은 레드 */
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .btn-playstore {
            background: var(--green);
            color: white;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.2);
        }

        .btn-guest {
            background: white;
            color: var(--text-sub);
            border: 1px solid var(--line-strong);
        }

        /* 내비게이션 */
        .section-nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .section-nav button {
            background: white;
            border: 1px solid var(--line);
            padding: 11px 18px;
            border-radius: 999px;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-sub);
            cursor: pointer;
            transition: all 0.2s;
        }

        .section-nav button:hover {
            background: #f8fafc;
            color: var(--green);
            border-color: var(--green);
        }

        /* 콘텐츠 카드 */
        .content-sections {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-top: 32px;
        }

        .content-card {
            background: white;
            border-radius: 28px;
            padding: 40px 32px;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(0,0,0,0.02);
            scroll-margin-top: 100px;
        }

        .content-card h2 {
            margin: 0 0 24px;
            font-size: 24px;
            font-weight: 800;
            color: #111827;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .content-card h2::before {
            content: '';
            width: 5px;
            height: 24px;
            background: var(--green);
            border-radius: 10px;
        }

        .content-card p {
            color: var(--text-sub);
            font-size: 16px;
            margin-bottom: 16px;
            word-break: keep-all;
        }

        /* 그리드 리스트 */
        .feature-list, .usage-list {
            display: grid;
            gap: 16px;
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .feature-item, .usage-item, .contact-item {
            background: #f8fafc;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid var(--line);
        }

        .feature-item strong, .usage-item strong, .contact-item strong {
            display: block;
            margin-bottom: 8px;
            font-size: 16px;
            color: #111827;
        }

        .feature-item span, .usage-item span, .contact-item span {
            font-size: 15px;
            color: var(--text-sub);
            display: block;
            line-height: 1.7;
        }

        .cta-box {
            margin-top: 32px;
            padding: 24px;
            background: #f0fdf4;
            border: 1px dashed var(--green);
            border-radius: 20px;
            text-align: center;
            font-weight: 700;
            color: #166534;
        }

        .footer {
            margin-top: 64px;
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
            margin: 0 8px;
        }

        /* 모바일 대응 */
        @media (max-width: 820px) {
            .feature-list, .usage-list { grid-template-columns: 1fr; }
        }

        @media (max-width: 640px) {
            h1 { font-size: 30px; }
            .hero-panel { padding: 40px 20px; }
            .content-card { padding: 32px 20px; }
        }
    </style>

        document.addEventListener('DOMContentLoaded', () => {
            const lang = getLanguage();
            document.documentElement.lang = lang;
            document.title = t('login_title');

            const section = sectionTexts[lang] || sectionTexts.en;

            const setElText = (id, text) => {
                const el = document.getElementById(id);
                if (el) el.innerText = text;
            };

            setElText('page-title', t('login_title'));
            setElText('googleLoginBtn', t('login_google'));
            setElText('playstore-link', t('login_playstore'));
            setElText('guestBtn', t('login_guest'));
            setElText('link-privacy', t('privacy_policy'));
            setElText('link-terms', t('terms_of_service'));
            setElText('error-title', t('invalid_sheet_id'));
            setElText('error-desc', t('invalid_sheet_desc'));

            setElText('hero-badge', section.heroBadge);
            setElText('hero-subtitle', section.heroSubtitle);

            setElText('nav-intro', section.navIntro);
            setElText('nav-features', section.navFeatures);
            setElText('nav-howto', section.navHowto);
            setElText('nav-contact', section.navContact);

            setElText('intro-title', section.introTitle);
            setElText('intro-p1', section.introP1);
            setElText('intro-p2', section.introP2);
            setElText('intro-p3', section.introP3);

            setElText('features-title', section.featuresTitle);
            setElText('feature-1-title', section.feature1Title);
            setElText('feature-1-desc', section.feature1Desc);

            setElText('feature-3-desc', section.feature3Desc);
            setElText('feature-4-title', section.feature4Title);
            setElText('feature-4-desc', section.feature4Desc);

            setElText('feature-5-desc', section.feature5Desc);

            setElText('howto-title', section.howtoTitle);
            setElText('howto-1-title', section.howto1Title);
            setElText('howto-1-desc', section.howto1Desc);
            setElText('howto-2-title', section.howto2Title);
            setElText('howto-2-desc', section.howto2Desc);
            setElText('howto-3-title', section.howto3Title);
            setElText('howto-3-desc', section.howto3Desc);
            setElText('howto-4-title', section.howto4Title);

            setElText('contact-email-label', section.contactEmailLabel);
            setElText('contact-guide-label', section.contactGuideLabel);
            setElText('contact-guide-value', section.contactGuideValue);

            setElText('cta-desc', t('landing_cta'));

            const guestBtn = document.getElementById('guestBtn');
            if (guestBtn) {
                guestBtn.addEventListener('click', () => {
                    const urlParams = new URLSearchParams(window.location.search);
                    const id = urlParams.get('id');
                    sessionStorage.setItem('currentSheetId', id || '');
                    sessionStorage.setItem('authMode', 'guest');
                    window.location.href = 'main.html';
                });
            }

            const langSelect = document.getElementById('index-language-select');
            if (langSelect) {
                langSelect.value = lang;
                langSelect.addEventListener('change', (e) => {
                    setLanguage(e.target.value);
                });
            }

            document.querySelectorAll('[data-scroll-target]').forEach(button => {
                button.addEventListener('click', () => {
                    const targetId = button.getAttribute('data-scroll-target');
                    const targetEl = document.getElementById(targetId);
                    if (targetEl) {
                        targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
            });
        });
